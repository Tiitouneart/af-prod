# Headers de sécurité AF Prod — inclus dans chaque bloc location de nginx.conf.
# >>> C'EST LA SOURCE RÉELLE DE LA CSP EN PRODUCTION <<<
# Le serveur est nginx:alpine (conteneur Docker) derrière Nginx Proxy Manager.
# Les fichiers ../_headers (Netlify) et ../.htaccess (Apache) ne sont PAS lus
# ici : garde-les en phase, mais c'est BIEN CE FICHIER qu'il faut éditer.
#
# La CSP autorise :
#   - l'appel AJAX du formulaire vers api.web3forms.com (connect-src + form-action) ;
#   - les vignettes YouTube (img-src) ;
#   - les players Spotify intégrés : frame-src open.spotify.com, plus
#     connect-src/img-src/media-src vers *.spotify.com et *.scdn.co (données,
#     pochettes, extraits audio).
# Toute nouvelle origine externe (script, font, image, API, iframe) doit être
# ajoutée ici, sinon le navigateur la bloquera en production.
#
# APRÈS modif : redémarrer le conteneur afprod ET purger le cache d'assets de
# NPM (sinon l'ancienne réponse — corps + en-têtes — est servie ~30 min) :
#   sudo docker exec services-proxy-manager-1 sh -c 'rm -rf /var/lib/nginx/cache/public/*'
#   sudo docker exec services-proxy-manager-1 nginx -s reload
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://img.youtube.com https://i.ytimg.com https://i.scdn.co https://*.scdn.co; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com https://*.spotify.com https://*.scdn.co; frame-src https://open.spotify.com; media-src https://*.scdn.co; form-action 'self' https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
