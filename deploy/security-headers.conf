# Headers de sécurité AF Prod — inclus dans chaque bloc location de nginx.conf.
# La CSP autorise l'appel AJAX du formulaire vers api.web3forms.com (connect-src
# + form-action). Toute nouvelle origine externe (script, font, image, API)
# doit être ajoutée ici, sinon le navigateur la bloquera en production.
add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://img.youtube.com https://i.ytimg.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com; form-action 'self' https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), interest-cohort=()" always;
