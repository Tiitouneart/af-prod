server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---------- En-têtes de sécurité (traduits du .htaccess) ----------
    # ATTENTION nginx : un add_header dans un bloc location { } REMPLACE tous
    # les add_header hérités. On regroupe donc TOUS les headers (sécurité +
    # cache) dans ce fichier inclus, et on l'inclut dans CHAQUE location qui
    # définit ses propres headers, sinon la CSP y serait perdue.
    # HSTS volontairement ABSENT : c'est Nginx Proxy Manager (terminaison TLS)
    # qui ajoute Strict-Transport-Security et force la redirection HTTPS.
    include /etc/nginx/snippets/security-headers.conf;

    # ---------- Empêcher l'accès aux fichiers sensibles ----------
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ---------- Cache : images ----------
    location ~* \.(?:jpg|jpeg|png|svg|webp|ico)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1y;
    }

    # ---------- Cache : CSS / JS ----------
    location ~* \.(?:css|js)$ {
        include /etc/nginx/snippets/security-headers.conf;
        expires 1M;
    }

    # ---------- HTML + routing ----------
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ =404;
        expires 1d;
    }

    # ---------- Compression GZIP ----------
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 256;
}
